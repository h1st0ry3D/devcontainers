min_version = { soft = "2024.11.1" }

[settings]
env_file = "mise.env"
env_shell_expand = true

[tools]
node = "24"
bun = "1.3.14"
python = "3.12"
java = "17"
android-sdk = { version = "20.0", depends = ["java"] }
devcontainer-cli = "0.87.0"
"npm:@github/copilot" = "1.0.55"
"npm:@earendil-works/pi-coding-agent" = "0.79.1"

[env]
EXPO_PACKAGE_MANAGER = "bun"
EDITOR = "code"

NPM_CONFIG_USERCONFIG = ".npmrc.local"

_.path = [
  "${ANDROID_HOME}/platform-tools",
  "/opt/homebrew/opt/ruby@3.4/bin",
  "./bin",
  "/Applications/Visual Studio Code.app/Contents/Resources/app/bin"
]
