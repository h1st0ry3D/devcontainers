min_version = { soft = "2024.11.1" }

[settings]
env_file = "mise.env"

[tools]
node = "lts"
bun = "1.3.8"
python = "3.12"
java = "17"
devcontainer-cli = "0.87.0"
"npm:@github/copilot" = "1.0.55"

[tools.android-sdk]
version = "20.0"
depends = ["java"]
postinstall = '''
android_user_home="${ANDROID_USER_HOME:-$HOME/.android}"
mkdir -p "$android_user_home/cache"
touch "$android_user_home/repositories.cfg"

yes | sdkmanager --sdk_root="$MISE_TOOL_INSTALL_PATH" --licenses >/dev/null || true
yes | sdkmanager --sdk_root="$MISE_TOOL_INSTALL_PATH" \
  "platform-tools" \
  "platforms;android-36" \
  "build-tools;35.0.0" \
  "build-tools;36.0.0" \
  "cmake;3.22.1" \
  "ndk;27.1.12297006"
'''

[env]
EXPO_PACKAGE_MANAGER = "bun"
EDITOR = "code"
_.path = [
  "/opt/homebrew/opt/ruby@3.4/bin",
  "./bin",
  "/Applications/Visual Studio Code.app/Contents/Resources/app/bin"
]
